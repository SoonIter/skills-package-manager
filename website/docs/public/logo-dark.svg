<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sparkGrad" x1="128" y1="40" x2="128" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF08A" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <linearGradient id="glassStroke" x1="64" y1="32" x2="192" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>

    <linearGradient id="glassFill" x1="64" y1="32" x2="192" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.05" />
    </linearGradient>

    <linearGradient id="baseGrad" x1="96" y1="176" x2="160" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <filter id="sparkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Glass Bulb -->
    <path d="M 96 180 C 96 144 64 136 64 96 A 64 64 0 1 1 192 96 C 192 136 160 144 160 180 Z" 
          fill="url(#glassFill)" stroke="url(#glassStroke)" stroke-width="8" stroke-linecap="round" />

    <!-- Base Socket / Threads -->
    <rect x="96" y="176" width="64" height="12" rx="4" fill="url(#baseGrad)" />
    <rect x="100" y="192" width="56" height="12" rx="4" fill="url(#baseGrad)" />
    <rect x="104" y="208" width="48" height="12" rx="4" fill="url(#baseGrad)" />
    <path d="M 112 224 L 144 224 L 136 240 L 120 240 Z" fill="#1E293B" />

    <!-- Glass Highlight Reflection -->
    <path d="M 80 96 Q 80 48 128 48 Q 96 64 88 96 Z" fill="#FFFFFF" fill-opacity="0.5" />
    <path d="M 176 136 Q 184 116 184 96 Q 168 112 168 136 Z" fill="#FFFFFF" fill-opacity="0.3" />

    <!-- The AI Spark Core -->
    <g filter="url(#sparkGlow)">
      <path d="M 128 40 Q 128 96 176 96 Q 128 96 128 152 Q 128 96 80 96 Q 128 96 128 40 Z" fill="url(#sparkGrad)" />
      <!-- Inner bright core -->
      <path d="M 128 72 Q 128 96 152 96 Q 128 96 128 120 Q 128 96 104 96 Q 128 96 128 72 Z" fill="#FFFFFF" />
    </g>

    <!-- Floating Particles -->
    <circle cx="192" cy="48" r="6" fill="url(#sparkGrad)" />
    <path d="M 64 44 Q 64 56 76 56 Q 64 56 64 68 Q 64 56 52 56 Q 64 56 64 44 Z" fill="#38BDF8" />
    <circle cx="176" cy="148" r="4" fill="#FDE047" />
  </g>
</svg>